                              <div data-popover-html>
                                <div style="margin: 5px;">
                                  <strong class="size-h4 color-primary" title="{{ $popoverTitle }}">{{ $popoverTitle }}</strong>
                                  <div class="size-h4 text-truncate text-very-compact color-subdue" title="{{ $popoverSubtitle }}">{{ $popoverSubtitle }}</div>
                                  <p class="margin-top-20" style="overflow-y: auto; text-align: justify; max-height: 20rem;">
                                    {{ if ne $popoverSummary "" }}
                                      {{ $popoverSummary }}
                                    {{ else }}
                                      TBA
                                    {{ end }}
                                  </p>
                                {{ if gt (len ($genres.Array "")) 0 }}
                                  <ul class="attachments margin-top-20">
                                    {{ range $genres.Array "" }}
                                      <li>{{ .String "" }}</li>
                                    {{ end }}
                                  </ul>
                                  {{ end }}
                                </div>
                              </div>
                              <img class="thumbnail" src="{{ $coverUrl }}" alt="Cover for {{ .String "title" }}" loading="lazy" style="width: 100%; height: 100%; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); object-fit: cover; border-radius: 0.5rem;">
                            </div>
                        </div>
                          <div class="shrink min-width-0" style="height: 9rem; position: relative; padding-top: 5px; padding-right: 5px;">
                            <strong class="size-h4 block text-truncate color-primary" title="{{ $title }}">{{ $title }}</strong>
                            <div class="text-truncate text-very-compact" title="{{ $subtitle }}">{{ $subtitle }}</div>
                            <div class="text-very-compact text-truncate">
                              {{ if eq $service "sonarr" }}
                                <div>{{ $seString }} - {{ $datetype }} {{ $date.Format "1/2 03:04PM" }}</div>
                              {{ else }}
                                <span>{{ $datetype }} {{ $date.Format "1/2" }}</span>
                              {{ end }}
                            </div>
              
                            {{ if $showGrabbed }}
                              {{ if eq $buttonJustify "right" }}
                                </div>
                                <a href="{{ $link }}" class="bookmarks-link size-h4 color-primary" target="_blank" rel="noreferrer"
                                  style="position: absolute; bottom: 1rem; right: 1rem;
                                    {{ if $grabbed }} color: var(--color-positive); border: 1px solid var(--color-positive); {{ else }} color: var(--color-negative); border: 1px solid var(--color-negative); {{ end }}
                                    font-weight: bold; padding: 2px 5px; border-radius: 3px; display: inline-block; margin-top: 5px; text-decoration: none;">
                                {{ if $grabbed }}Grabbed{{ else }}Missing{{ end }}
                                </a>
                              {{ else }}
                                <a href="{{ $link }}" class="bookmarks-link size-h4 color-primary" target="_blank" rel="noreferrer"
                                  style="{{ if $grabbed }} color: var(--color-positive); border: 1px solid var(--color-positive); {{ else }} color: var(--color-negative); border: 1px solid var(--color-negative); {{ end }}
                                    font-weight: bold; padding: 2px 5px; border-radius: 3px; display: inline-block; margin-top: 5px; text-decoration: none;">
                                {{ if $grabbed }}Grabbed{{ else }}Missing{{ end }}
                                </a>
                                </div>
                              {{ end }}
                            {{ else }}
                              <div class="{{ if eq $size "small" }}text-truncate{{ if eq $service "radarr" }} margin-top-5{{ end }}{{ else }}text-truncate-2-lines margin-top-5{{ end }}">
                                {{ $summary }}
                              </div>
                            {{ end }}
                        </div>
                      </li>
                    {{ end }}
                  {{ end }}
                  {{ if not $itemDisplayed }}
                    <li>No items found.</li>
                  {{ end }}
                </ul>
              {{ end }}

      - size: full
        widgets:

      #################################################
      # FULL MEDIA SERVER PLAYER | PLEX
      #################################################

          - type: custom-api
            title: Media Server
            cache: 5m
            options:
              media-server: "plex"
              base-url: http://${SERVER_IP}:${PORT}
              api-key: ${PLEX_TOKEN}
              small-column: true
              compact: false
              play-state: "indicator"
              show-thumbnail: true
              full-thumbnail: true
              show-paused: true
              show-progress-bar: true
              show-progress-info: true
              time-format: "15:04"
            template: |
              {{ $mediaServer := .Options.StringOr "media-server" "" }}
              {{ $baseURL := .Options.StringOr "base-url" "" }}
              {{ $apiKey := .Options.StringOr "api-key" "" }}

              {{ define "errorMsg" }}
                <div class="widget-error-header">
                  <div class="color-negative size-h3">ERROR</div>
                  <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
                  </svg>
                </div>
                <p class="break-all">{{ . }}</p>
              {{ end }}

              {{ if or
                (eq $mediaServer "")
                (eq $baseURL "")
                (eq $apiKey "")
              }}
                {{ template "errorMsg" "Some required options are not set" }}
              {{ else }}

              {{ $isSmallColumn := .Options.BoolOr "small-column" false }}
              {{ $isCompact := .Options.BoolOr "compact" true }}
              {{ $playState := .Options.StringOr "play-state" "indicator" }}
              {{ $showThumbnail := .Options.BoolOr "show-thumbnail" false }}
              {{ $fullThumbnail := .Options.BoolOr "full-thumbnail" false }}
              {{ $showPaused := .Options.BoolOr "show-paused" false }}
              {{ $showProgressBar := .Options.BoolOr "show-progress-bar" false }}
              {{ $showProgressInfo := .Options.BoolOr "show-progress-info" true }}
              {{ $timeFormat := .Options.StringOr "time-format" "15:04" }}

              {{ $userID := "" }}
              {{ $sessionsRequestURL := "" }}
              {{ $sessionsCall := "" }}
              {{ $sessions := "" }}
              {{ $activeSessions := 0 }}

              {{ if eq $mediaServer "plex" }}
                {{ $sessionsRequestURL = concat $baseURL "/status/sessions" }}
                {{ $sessionsCall = newRequest $sessionsRequestURL
                  | withHeader "Accept" "application/json"
                  | withHeader "X-Plex-Token" $apiKey
                  | getResponse }}

                {{ if $sessionsCall.JSON.Exists "MediaContainer" }}
                  {{ $sessions = $sessionsCall.JSON.Array "MediaContainer.Metadata" }}
                  {{ $activeSessions = len $sessions }}
                {{ else }}
                  {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
                {{ end }}

              {{ else if eq $mediaServer "tautulli" }}
                {{ $sessionsRequestURL = concat $baseURL "/api/v2" }}
                {{ $sessionsCall = newRequest $sessionsRequestURL
                  | withParameter "apikey" $apiKey
                  | withParameter "cmd" "get_activity"
                  | withHeader "Accept" "application/json"
                  | getResponse }}

                {{ if eq $sessionsCall.Response.StatusCode 200 }}
                  {{ $sessions = $sessionsCall.JSON.Array "response.data.sessions" }}
                  {{ $activeSessions = len $sessions }}
                {{ else }}
                  {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
                {{ end }}

              {{ else if or (eq $mediaServer "jellyfin") (eq $mediaServer "emby") }}
                {{ $sessionsRequestURL = concat $baseURL "/Sessions" }}
                {{ $sessionsCall = newRequest $sessionsRequestURL
                  | withParameter "api_key" $apiKey
                  | withParameter "activeWithinSeconds" "30"
                  | withHeader "Accept" "application/json"
                  | getResponse }}

                {{ if eq $sessionsCall.Response.StatusCode 200 }}
                  {{ $sessions = $sessionsCall.JSON.Array "" }}
                  {{ if eq $mediaServer "emby" }}
                    {{ range $session := $sessions }}
                      {{ if $session.Bool "PlayState.CanSeek" }}
                        {{ $activeSessions = 1 }}
                        {{ break }}
                      {{ end }}
                    {{ end }}
                  {{ else }}
                    {{ $activeSessions = len $sessions }}
                  {{ end }}
                {{ else }}
                  {{ template "errorMsg" (concat "Could not fetch " $mediaServer " API.") }}
                {{ end }}
              {{ end }}

              {{ if and (eq $sessionsCall.Response.StatusCode 200) (eq $activeSessions 0) }}
                <p>Nothing is playing right now.</p>
              {{ else }}

                <style>
                  .media-server-session-container--grid {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                  }
                  @media (max-width: 768px) {
                    .media-server-session-container--grid {
                      display: flex;
                      flex-direction: column;
                    }
                  }
                  .media-server-progress-container {
                    height: 1rem;
                    max-width: 32rem;
                    border: 1px solid var(--color-text-base);
                    border-radius: var(--border-radius);
                    overflow: hidden;
                  }
                  .media-server-progress-bar {
                    height: 100%;
                    background: var(--color-primary);
                    border-radius: 3px;
                    transition: width 1s linear;
                  }
                  @keyframes progress-animation { to { width: 100%; } }
                </style>

                <div class="gap-10 {{ if $isSmallColumn }}flex flex-column{{ else }}media-server-session-container--grid{{ end }}">
                {{ range $i, $session := $sessions }}
                  {{ $isClient := true }}
                  {{ $isPlaying := false }}
                  {{ $state := "playing" }}
                  {{ $isMovie := false }}
                  {{ $isShows := false }}
                  {{ $isMusic := false }}
                  {{ $userName := "" }}
                  {{ $title := "" }}
                  {{ $showTitle := "" }}
                  {{ $showSeason := "" }}
                  {{ $showEpisode := "" }}
                  {{ $artist := "" }}
                  {{ $albumTitle := "" }}
                  {{ $thumbURL := "" }}
                  {{ $now := now | formatTime "15:04:05" | parseLocalTime "15:04:05" }}
                  {{ $duration := 0 }}
                  {{ $offset := 0 }}
                  {{ $remainingSeconds := 0 }}

                  {{ if eq $mediaServer "plex" }}
                    {{ $isPlaying = eq ($session.String "Player.state") "playing" }}
                    {{ if not $isPlaying }}
                      {{ $state = "paused"}}
                    {{ end }}

                    {{ $mediaType := $session.String "type" }}
                    {{ $isMovie = eq $mediaType "movie" }}
                    {{ $isShows = eq $mediaType "episode" }}
                    {{ $isMusic = eq $mediaType "track" }}

                    {{ $userName = $session.String "User.title" }}
                    {{ $title = $session.String "title" }}
                    {{ $showTitle = $session.String "grandparentTitle" }}
                    {{ $showSeason = $session.String "parentIndex" }}
                    {{ $showEpisode = $session.String "index" }}
                    {{ $artist = $session.String "grandparentTitle" }}
                    {{ $albumTitle = $session.String "parentTitle" }}

                    {{ $thumbID := $session.String "thumb" }}
                    {{ if or $isShows $isMusic }}
                      {{ $thumbID = $session.String "parentThumb" }}
                    {{ end }}
                    {{ $thumbURL = concat $baseURL $thumbID "?X-Plex-Token=" $apiKey }}

                    {{ $duration = $session.Float "duration" }}
                    {{ $offset = $session.Float "viewOffset" }}
                    {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                  {{ else if eq $mediaServer "tautulli" }}
                    {{ $isPlaying = eq ($session.String "state") "playing" }}
                    {{ if not $isPlaying }}
                      {{ $state = "paused"}}
                    {{ end }}

                    {{ $mediaType := $session.String "media_type" }}
                    {{ $isMovie = eq $mediaType "movie" }}
                    {{ $isShows = eq $mediaType "episode" }}
                    {{ $isMusic = eq $mediaType "track" }}

                    {{ $userName = $session.String "user" }}
                    {{ $title = $session.String "title" }}
                    {{ $showTitle = $session.String "grandparent_title" }}
                    {{ $showSeason = $session.String "parent_media_index" }}
                    {{ $showEpisode = $session.String "media_index" }}
                    {{ $artist = $session.String "grandparent_title" }}
                    {{ $albumTitle = $session.String "parent_title" }}

                    {{ $thumbID := $session.String "thumb" }}
                    {{ if or $isShows $isMusic }}
                      {{ $thumbID = $session.String "parent_thumb" }}
                    {{ end }}
                    {{ $thumbURL = concat $baseURL "/api/v2?apikey=" $apiKey "&cmd=pms_image_proxy&img=" $thumbID }}

                    {{ $duration = $session.Float "duration" }}
                    {{ $offset = $session.Float "view_offset" }}
                    {{ $remainingSeconds = div (sub $duration $offset) 1000 | toInt }}
                  {{ else if or (eq $mediaServer "jellyfin") (eq $mediaServer "emby") }}
                    {{ if eq $mediaServer "emby" }}
                      {{ $isClient = $session.Bool "PlayState.CanSeek" }}
                    {{ end }}
                    {{ $isPlaying = and ($session.Exists "NowPlayingItem") (not ($session.Bool "PlayState.IsPaused")) }}
                    {{ if not $isPlaying }}
                      {{ $state = "paused"}}
                    {{ end }}

                    {{ $mediaType := $session.String "NowPlayingItem.Type" }}
                    {{ $isMovie = eq $mediaType "Movie" }}
                    {{ $isShows = eq $mediaType "Episode" }}
                    {{ $isMusic = eq $mediaType "Audio" }}

                    {{ $userName = $session.String "UserName" }}
                    {{ $title = $session.String "NowPlayingItem.Name" }}
                    {{ $showTitle = $session.String "NowPlayingItem.SeriesName" }}
                    {{ $showSeason = $session.String "NowPlayingItem.ParentIndexNumber" }}
                    {{ $showEpisode = $session.String "NowPlayingItem.IndexNumber" }}
                    {{ $artist = $session.String "NowPlayingItem.AlbumArtist" }}
                    {{ $albumTitle = $session.String "NowPlayingItem.Album" }}

                    {{ $thumbID := $session.String "NowPlayingItem.Id" }}
                    {{ if $isShows }}
                      {{ $thumbID = $session.String "NowPlayingItem.ParentId" }}
                    {{ end }}
                    {{ $thumbURL = concat $baseURL "/Items/" $thumbID "/Images/Primary?api_key=" $apiKey }}

                    {{ $duration = $session.Float "NowPlayingItem.RunTimeTicks" }}
                    {{ $offset = $session.Float "PlayState.PositionTicks" }}
                    {{ $remainingSeconds = div (sub $duration $offset) 10000000 | toInt }}
                  {{ end }}

                  {{ $progress := mul 100 (div $offset $duration) | toInt }}
                  {{ $endTime := $now.Add (duration (printf "%ds" $remainingSeconds)) | formatTime $timeFormat }}

                  {{ $showInfoFormat := concat "Season " $showSeason " Episode " $showEpisode}}
                  {{ if $isCompact }}
                    {{ $showInfoFormat = concat "S" $showSeason "E" $showEpisode}}
                  {{ end }}

                  {{ if and $isClient (or $isPlaying $showPaused) }}
                  <div class="card gap-5">
                    <div class="flex items-center gap-10 size-h3">
                      <span class="color-primary">{{ $userName }}</span>
                      {{ if eq $playState "text" }}
                        <span {{ if $isPlaying }}class="color-primary"{{ end }}>
                          [{{ $state }}]
                        </span>
                      {{ else if eq $playState "indicator" }}
                        <style>
                          .media-server-indicator {
                            height: .7rem;
                            width: .7rem;
                            border-radius: 100%;
                            {{ if $isPlaying }}
                              animation: pulse 5s infinite;
                              background: var(--color-primary);
                            {{ else }}
                              background: var(--color-text-base-muted);
                            {{ end }}
                          }
                          @keyframes pulse {
                            0% { box-shadow: 0 0 0 0 var(--color-text-base); }
                            40% { box-shadow: 0 0 0 4px transparent; }
                            100% { box-shadow: 0 0 0 4px transparent; }
                          }
                        </style>
                        <div class="media-server-indicator"></div>
                      {{ end }}
                    </div>

                    <hr class="margin-bottom-5" />

                    <div class="flex items-center gap-10" style="align-items: stretch;">
                      {{ if $showThumbnail }}
                        <img src="{{ $thumbURL | safeURL }}"
                          alt="{{ $title }} thumbnail"
                          class="shrink-0"
                          loading="lazy"
                          style="
                            max-width: 7.5rem;
                            border: 2px solid var(--color-primary);
                            border-radius: var(--border-radius);
                            object-fit: cover;
                            {{ if and $isCompact (not $fullThumbnail) }} aspect-ratio: 1; {{ end }} "
                        />
                      {{ end }}
                      <ul class="flex flex-column grow justify-evenly" style="width: 0;">
                        {{ if $isCompact }}
                          {{ if $isShows }}
                            <ul class="list-horizontal-text flex-nowrap">
                              <li class="shrink-0">{{ concat "S" $showSeason "E" $showEpisode }}</li>
                              <li class="text-truncate">{{ $showTitle }}</li>
                            </ul>
                          {{ else if $isMusic }}
                            <ul class="list-horizontal-text flex-nowrap">
                              <li class="shrink-0">{{ $artist }}</li>
                              <li class="text-truncate">{{ $albumTitle }}</li>
                            </ul>
                          {{ end }}
                          <li class="text-truncate">{{ $title }}</li>
                        {{ else }}
                          {{ if $isShows }}
                            <li>{{ $showTitle }}</li>
                            <li>{{ concat "S" $showSeason "E" $showEpisode }}</li>
                          {{ else if $isMusic }}
                            <li>{{ $artist }}</li>
                            <li>{{ $albumTitle }}</li>
                          {{ end }}
                          <li>{{ $title }}</li>
                        {{ end }}

                        <li>
                          {{ if and $isPlaying $showProgressBar }}
                            <div class="flex gap-10 items-center">
                              <div class="media-server-progress-container grow">
                                <div
                                  class ="media-server-progress-bar"
                                  data-progress="{{ $progress }}"
                                  data-remaining="{{ $remainingSeconds }}"
                                  style="
                                    width: {{ $progress }}%;
                                    animation: progress-animation {{ $remainingSeconds }}s linear forwards;"
                                >
                                </div>
                              </div>
                              {{ if $showProgressInfo }}
                                <p>
                                  {{ if and (not $isCompact) (not $isSmallColumn) }}
                                    ends at 
                                  {{ end }}
                                  {{ $endTime }}
                                </p>
                              {{ end }}
                            </div>
                          {{ end }}
                        </li>
                      </ul>
                    </div>
                  </div>
                  {{ end }}
                {{ end }}
              </div>
              {{ end }}
              {{ end }}

      #################################################
      # FULL CALENDARIO  | GOOGLE
      #################################################

          - type: custom-api
            title: Upcoming Google Calendar Events
            title-url: https://calendar.google.com
            cache: 15m
            template: |
              {{ $body := "client_id=${GOOGLE_CLIENT_ID}&client_secret=${GOOGLE_CLIENT_SECRET}&refresh_token=${GOOGLE_REFRESH_TOKEN}&grant_type=refresh_token" }}
              {{ $token := newRequest "https://oauth2.googleapis.com/token"
                | withHeader "Content-Type" "application/x-www-form-urlencoded"
                | withStringBody $body
                | getResponse }}
              {{ if ne $token.Response.StatusCode 200 }}
                <p class="color-negative">Failed to get token: {{ $token.Response.Status }}</p>
              {{ else }}
                {{ $accessToken := $token.JSON.String "access_token" }}
                {{ $nowtime := now | formatTime "rfc3339" }}
                {{ $future := offsetNow "720h" | formatTime "rfc3339" }}
                {{ $events := newRequest "https://www.googleapis.com/calendar/v3/calendars/primary/events"
                  | withParameter "timeMin" $nowtime
                  | withParameter "timeMax" $future
                  | withParameter "singleEvents" "true"
                  | withParameter "orderBy" "startTime"
                  | withHeader "Authorization" (print "Bearer " $accessToken)
                  | getResponse }}
                {{ if ne $events.Response.StatusCode 200 }}
                  <p class="color-negative">Failed to fetch events: {{ $events.Response.Status }}</p>
                {{ else }}
                  <div>
                    {{ range $events.JSON.Array "items" }}
                      {{ $start := .String "start.dateTime" }}
                      {{ $end := .String "end.dateTime" }}
                      {{ $isAllDay := eq $start "" }}
                      {{ if $isAllDay }}
                        {{ $start = .String "start.date" | parseLocalTime "DateOnly" }}
                        {{ $end = .String "end.date" | parseLocalTime "DateOnly" }}
                      {{ else }}
                        {{ $start = $start | parseTime "rfc3339" }}
                        {{ $end = $end | parseTime "rfc3339" }}
                      {{ end }}
                      {{ $startDateOnly := $start | formatTime "DateOnly" }}
                      {{ $endDateOnly := $end | formatTime "DateOnly" }}
                      {{ $isStartAndEndDateSame := eq $startDateOnly $endDateOnly }}
                      <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start;">
                        <a href="https://calendar.google.com/calendar/u/0" target="_blank" class="size-h4 color-primary" style="text-align: left; width: 215px;">
                          {{ .String "summary" }}
                        </a>
                        <a href="https://calendar.google.com/calendar/u/0" target="_blank" class="size-h5 color-subdue" style="text-align: left;">
                          {{ if $isAllDay }}
                            {{ $start | formatTime "Mon, Jan 2" }}
                            {{ if not $isStartAndEndDateSame }} - {{ $end | formatTime "Mon, Jan 2" }}{{ end }}
                            · All day
                          {{ else }}
                            {{ $start | formatTime "Mon, Jan 2 · 3:04 PM" }}
                            {{ if $isStartAndEndDateSame }}
                              - {{ $end | formatTime "3:04 PM" }}
                            {{ else }}
                              - {{ $end | formatTime "Mon, Jan 2 · 3:04 PM" }}
                            {{ end }}
                          {{ end }}
                        </a>
                        <div class="color-primary size-h5" style="text-align: right; width: 75px;" {{ $start | toRelativeTime }}></div>
                      </div>
                    {{ end }}
                  </div>
                {{ end }}
              {{ end }}


          #################################################
          # Bookmarks
          #################################################

          - type: bookmarks
            groups:

              - title: Raspberry (Local)
                links:
                  - title: Glances Local
                    url: http://${SERVER_IP}:${PORT}
                  - title: Dashboard Local
                    url: http://${SERVER_IP}:${PORT}
                  - title: Arcane Local
                    url: http://${SERVER_IP}:${PORT}

              - title: VM Google (Tailscale)
                links:
                  - title: Glances VM
                    url: http://${GCP_TAILSCALE_IP}:${PORT}
                  - title: Dashboard VM
                    url: http://${GCP_TAILSCALE_IP}:${PORT}

              - title: Network
                links:
                  - title: Router
                    url: http://${ROUTER_IP}
                  - title: Tailscale
                    url: https://login.tailscale.com/admin


      - size: small
        widgets:

          #################################################
          # CUSTOM API - Trending Media
          #################################################

          - type: custom-api
            title: Trending Media
            title-url: http://${SERVER_IP}:${PORT}/discover/trending    # trending, movies, or tv
            url: http://${SERVER_IP}:${PORT}/api/v1/discover/trending   # trending, movies, or tv
            cache: 15m
            headers:
              accept: "application/json"
              x-api-key: ${SEERR_API_KEY}
            parameters:
              language: "en" # this can be changed to other languages if desired
              page: "1"
            options:
              show-media-type: true # set to false to hide the "| TV" or "| Movie" suffix
              show-media-desc: true # set to false to hide the media's summary
            template: |
              {{ $showMediaType := .Options.BoolOr "show-media-type" true }}
              {{ $showMediaDesc := .Options.BoolOr "show-media-desc" true }}

              {{ if eq .Response.StatusCode 200 }}
                {{ $items := .JSON.Array "results" }}
                {{ if gt (len $items) 0 }}
                  <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
                  {{ range $items }}
                    <li class="flex items-start gap-10 thumbnail-container thumbnail-parent">
                      {{ $mediaType := .String "mediaType" }}
                      {{ $mediaTitle := "" }}
                      {{ $mediaTypeUpper := "" }}
                      {{ if eq $mediaType "movie" }} {{ $mediaTitle = .String "title" }} {{ $mediaTypeUpper = "Movie" }}{{ else }}{{ $mediaTitle = .String "name" }} {{ $mediaTypeUpper = "TV" }}{{ end }}
                      {{ $overseerrUrl := concat "http://${SERVER_IP}:${PORT}" "/" $mediaType "/" ( .String "id" ) }}
                      {{ $tmdbUrl := concat "https://www.themoviedb.org" "/" $mediaType "/" ( .String "id" ) }}
                      <a href={{ $overseerrUrl }} target="_blank">
                      <img src={{ concat "https://image.tmdb.org/t/p/w300" (.String "posterPath") }} style="border-radius: 5px; min-width: 5rem; max-width: 5rem;" class="card">
                      </a>
                      <div class="flex-1" style="padding-right: 5px;">
                        <p class="color-positive size-h4 text-truncate-2-lines margin-top-5" title={{ $mediaTitle }}><a href={{ $overseerrUrl }} target="_blank">{{ $mediaTitle }}</p>
                        <p class="size-h4" title="TMDB Rating"><a href={{ $tmdbUrl }} target="_blank">TMDB: {{ mul (.Float "voteAverage") 10 | toInt }}% {{ if $showMediaType }}| {{ $mediaTypeUpper }}{{ end }}</a></p>
                        {{ if $showMediaDesc }}<p class="color-subdue size-h4 text-truncate-2-lines" title={{ .String "overview" }}>{{ .String "overview" }}</p>{{ end }}
                      </div>
                    </li>
                  {{ end }}
                  </ul>
                {{ else }}
                  <details style="margin-top:0.5rem">
                    <summary> Raw JSON:</summary>
                    <pre stye="font-size:10px">
                {{ (printf "%+v" .JSON) }}
                    </pre>
                  </details>
                {{ end }}
              {{ end }}

          #################################################
          # RSS - Tech
          #################################################

