# NOTE:
# This file uses environment variables.
# Make sure to create your own .env file.
# Do NOT use real tokens from this repo.



#################################################
#                    THEME
#################################################

theme:
  background-color: 210 20 13
  primary-color: 212 100 50
  positive-color: 140 70 40
  negative-color: 4 78 57
  contrast-multiplier: 1.25


#################################################
#                    PAGES HOME
#################################################
pages:
  - name: Home
    columns:

      #################################################
      # COLUMN 1 - SMALL (Clock / Calendar / Weather)
      #################################################

      - size: small
        widgets:

          - type: group
            widgets:
              - type: custom-api
                title: Day
                body-type: string
                skip-json-validation: true
                cache: 1s
                template: |
                  {{ $localTime := now }}
                  {{ $secondsPerDay := 86400 }}
                  {{ $elapsedSeconds := add (mul $localTime.Hour 3600) (mul $localTime.Minute 60) | add $localTime.Second }}
                  {{ $dayProgress := div (mul $elapsedSeconds 100.0) $secondsPerDay }}

                  {{ $gradient := "" }}
                  {{ if lt $dayProgress 10.0 }}
                    {{ $gradient = "#70a1ff" }}
                  {{ else if lt $dayProgress 25.0 }}
                    {{ $gradient = "#ff6b6b, #70a1ff" }}
                  {{ else if lt $dayProgress 50.0 }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df" }}
                  {{ else }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df, #70a1ff" }}
                  {{ end }}

                  <div style="font-family: sans-serif; text-align: center;">
                    <div style="width: 100%; height: 12px; background: #23262F; border:1px solid gray; border-radius: 10px; overflow: hidden;">
                      <div style="
                        height: 100%;
                        width: {{ $dayProgress }}%;
                        background: linear-gradient(90deg, {{ $gradient }});
                      "></div>
                    </div>
                    <div class="size-h1" style="margin-top: 6px;">{{ printf "%.2f" $dayProgress }}% of the day has passed</div>
                  </div>

              - type: custom-api
                title: Month
                body-type: string
                skip-json-validation: true
                cache: 1s
                template: |
                  {{ $localTime := now }}

                  {{ $month := $localTime.Month }}
                  {{ $dayOfMonth := $localTime.Day }}

                  {{ $secondsToday := add (mul $localTime.Hour 3600) (mul $localTime.Minute 60) | add $localTime.Second }}
                  {{ $fractionOfDay := div $secondsToday 86400.0 }}

                  {{ $daysInMonth := 31 }}
                  {{ if eq $month 2 }} {{ $daysInMonth = 28 }} {{ end }}
                  {{ if or (eq $month 4) (eq $month 6) (eq $month 9) (eq $month 11) }} {{ $daysInMonth = 30 }} {{ end }}

                  {{ $daysElapsed := add (sub $dayOfMonth 1) $fractionOfDay }}
                  {{ $monthProgress := mul (div $daysElapsed $daysInMonth) 100.0 }}

                  {{ $gradient := "" }}
                  {{ if lt $monthProgress 10.0 }}
                    {{ $gradient = "#70a1ff" }}
                  {{ else if lt $monthProgress 25.0 }}
                    {{ $gradient = "#ff6b6b, #70a1ff" }}
                  {{ else if lt $monthProgress 50.0 }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df" }}
                  {{ else }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df, #70a1ff" }}
                  {{ end }}

                  <div style="font-family: sans-serif; text-align: center;">
                    <div style="width: 100%; height: 12px; background: #23262F; border:1px solid gray; border-radius: 10px; overflow: hidden;">
                      <div style="
                        height: 100%;
                        width: {{ $monthProgress }}%;
                        background: linear-gradient(90deg, {{ $gradient }});
                      "></div>
                    </div>
                    <div class="size-h1" style="margin-top: 6px;">{{ printf "%.2f" $monthProgress }}% of the month has passed</div>
                  </div>

              - type: custom-api
                title: Year
                body-type: string
                skip-json-validation: true
                cache: 1s
                template: |
                  {{ $localTime := now }}
                  
                  {{ $secondsToday := add (mul $localTime.Hour 3600) (mul $localTime.Minute 60) | add $localTime.Second }}
                  {{ $dayOfYear := $localTime.YearDay }}
                  {{ $secondsElapsed := add (mul (sub $dayOfYear 1) 86400) $secondsToday }}

                  {{ $totalSecondsInYear := mul 365 86400 }}
                  {{ $yearProgress := div (mul $secondsElapsed 100.0) $totalSecondsInYear }}

                  {{ $gradient := "" }}
                  {{ if lt $yearProgress 10.0 }}
                    {{ $gradient = "#70a1ff" }}
                  {{ else if lt $yearProgress 25.0 }}
                    {{ $gradient = "#ff6b6b, #70a1ff" }}
                  {{ else if lt $yearProgress 50.0 }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df" }}
                  {{ else }}
                    {{ $gradient = "#ff6b6b, #f8e71c, #7ed6df, #70a1ff" }}
                  {{ end }}

                  <div style="font-family: sans-serif; text-align: center;">
                    <div style="width: 100%; height: 12px; background: #23262F; border:1px solid gray; border-radius: 10px; overflow: hidden;">
                      <div style="
                        height: 100%;
                        width: {{ $yearProgress }}%;
                        background: linear-gradient(90deg, {{ $gradient }});
                      "></div>
                    </div>
                    <div class="size-h1" style="margin-top: 6px;">{{ printf "%.2f" $yearProgress }}% of the year has passed</div>
                  </div>


          - type: clock
            hour-format: 24h
            show-progress: true
            timezones:
             - timezone: America/Santiago
               label: Santiago de Chile

             - timezone: America/Caracas
               label: Maracaibo

             - timezone: Europe/Madrid
               label: Madrid

             - timezone: America/New_York
               label: Ohio (USA)

             - timezone: America/Argentina/Buenos_Aires
               label: Buenos Aires

             - timezone: America/Toronto
               label: Hamilton & Montreal

          - type: calendar

          - type: weather
            location: "${WEATHER_LOCATION}"
            units: metric



      #################################################
      # COLUMN 2 - FULL (Infra Stats)
      #################################################

      - size: full
        widgets:

          - type: server-stats
            servers:
              - type: local
                name: Raspberry
                hide-mountpoints-by-default: true
                mountpoints:
                  "/":
                    hide: false
                    name: NVMe
                  "/mnt/series_usb":
                    hide: false
                    name: USB HDD 

          - type: monitor
            title: Homelab Status
            cache: 1m
            sites:

              - title: AdGuard Home
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/adguard-home.svg

              - title: Arcane
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/arcane.svg

              - title: Glance
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/glances-light.svg

              - title: Glances
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/glances.svg

              - title: Jackett
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/jackett.svg

              - title: Plex
                url: http://${SERVER_IP}:32400/identity
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/plex.svg

              - title: Prowlarr
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/prowlarr.svg

              - title: qBittorrent
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/qbittorrent.svg

              - title: Radarr
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/radarr.svg

              - title: Sonarr
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/sonarr.svg

              - title: Speedtest Tracker
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/speedtest-tracker.png

              - title: WG Easy
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/wireguard.svg

              - title: Home Assistant
                url: http://${HA_IP}:8123/manifest.json
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/home-assistant.svg

              - title: VM Google (Glances)
                url: https://console.cloud.google.com/welcome?project=${GCP_PROJECT_ID}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/google-cloud-platform.svg

              - title: Pi.Alert
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/netalertx.svg

              - title: Duplicati
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/duplicati.svg

              - title: Homepage
                url: http://${SERVER_IP}:${PORT}
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/homepage.png

              - title: Retro Arch
                url: http://${RETROARCH_IP}
                icon: https://images.icon-icons.com/3914/PNG/512/retroarch_logo_icon_248653.png

      #################################################
      # FULL Nginx Proxy Manager
      #################################################

          - type: custom-api
            title: Nginx Proxy Manager
            cache: 12h
            url: http://${SERVER_IP}:${PORT}/api/tokens
            method: POST
            body-type: json
            body:
              identity: ${NPM_USERNAME}
              secret: ${NPM_PASSWORD}
            options:
              collapse-after: 6
              show-icons: true
              domain-name: ".${MY_DOMAIN}"
              tooltip-enabled: true
              arcane: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/arcane.svg
              asus: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/asus-router.svg
              cockpit: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/redhat-linux.svg
              duplicati: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/duplicati.svg
              glancespi: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/glances.svg
              ha: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/home-assistant.svg
              home: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/glance.svg
              homepage: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/homepage.png
              jackett: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/jackett.svg
              npm: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nginx-proxy-manager.svg
              pialert: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/netalertx.svg
              plex: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/plex.svg
              prowlarr: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/prowlarr.svg
              qbittorrent: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/qbittorrent.svg
              radarr: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/radarr-4k.svg
              sonarr: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/sonarr-4k.svg
              speedtesttracker: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/speedtest-tracker.png
              wgeasy: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/wireguard.svg
              seerr: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/seerr.svg

            template: |
              <style>
                .widget-type-nginx li {
                  margin-top: var(--list-half-gap); 
                  border-top: 1px solid var(--color-separator);
                  padding-top: var(--list-half-gap);
                }
                .widget-ngix-proxy-icon, .widget-ngix-proxy-icon-default  {
                  display: block;
                  filter: grayscale(0.4);
                  object-fit: contain;
                  aspect-ratio: 1 / 1;
                  width: 2.7rem;
                  opacity: 0.8;
                  transition: filter 0.3s, opacity 0.3s;
                }
                :root[data-scheme="dark"] .widget-ngix-proxy-icon {
                  filter: invert(100%);
                } 
              </style>

              {{ $defaultIconUrl := "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/nginx-proxy-manager.svg" }}
                
              {{ if eq .Response.StatusCode 200 }}
                {{ $accessToken := .JSON.String "token" }}
                {{
                  $proxyHosts := newRequest (concat "http://${SERVER_IP}:${PORT}" "/api/nginx/proxy-hosts")
                    | withHeader "Authorization" (print "Bearer " $accessToken)
                    | getResponse
                }}
                <ul class="dynamic-columns list list-gap-15 list-with-separator collapsible-container" data-collapse-after="{{ .Options.IntOr "collapse-after" 6 }}">
                  {{ range $proxyHosts.JSON.Array "" }}
                    {{ if and (.String "domain_names.0") (.Bool "enabled") }}
                      
                      {{ $proxy_url  := (concat (.String "forward_scheme") "://" (.String "domain_names.0") ) }}
                      {{ $host_url   := (concat (.String "forward_scheme") "://" (.String "forward_host") ":" (.String "forward_port") ) }}
                      {{ $subDomain  := .String "domain_names.0" | trimSuffix ($.Options.StringOr "domain-name" "") }}

                      <li class="flex items-center gap-20">
                        {{ if $.Options.BoolOr "show-icons" true }}
                          <div class="shrink-0">
                              {{ $iconUrl := $.Options.StringOr $subDomain $defaultIconUrl}}
                              {{ if eq $iconUrl $defaultIconUrl }}
                                <img class="widget-ngix-proxy-icon-default" src="{{ $defaultIconUrl }}" loading="lazy">
                              {{ else }}
                                {{ if ne (findMatch "://" $iconUrl) "://" }}
                                  <img class="widget-ngix-proxy-icon" src="https://simpleicons.org/icons/{{$iconUrl}}.svg" loading="lazy">
                                {{ else }}
                                  <img class="widget-ngix-proxy-icon" src="{{ $iconUrl }}" loading="lazy">
                                {{ end }}
                              {{ end }}
                          </div>
                        {{ end }}

                        <div class="min-width-0 grow">
                          <a href='{{ $proxy_url }}' class="color-highlight size-title-dynamic block" style="display: inline;" target="_blank" rel="noreferrer"
                              {{if $.Options.BoolOr "tooltip-enabled" false}}data-popover-type="text" data-popover-text="{{$proxy_url}}"{{end}}
                            >{{ $subDomain }}</a>
                          <div class="flex items-center gap-10" style="margin-bottom: 5px">
                            <div class="text-left">➔</div>
                            <div class="size-h6 flex-1 text-left">
                              <a href='{{ $host_url }}' target="_blank" rel="noreferrer">{{ $host_url }}</a>
                            </div>
                          </div>
                        </div>
                      </li>
                    {{ end }}
                  {{ end }}
                </ul>

              {{ else }}
                <p class='color-negative'>Failed to get token: {{ .JSON.String "error.message" }} ({{ $.Response.Status }}) </p>
              {{ end }}

      #################################################
      # DOCKER CONTAINERS
      #################################################

          - type: docker-containers


      #################################################
      # COLUMN 3 - SMALL (RSS + APIs)
      #################################################

      - size: small
        widgets:

      #################################################
      # COLUMN 3 - SMALL IP PUBLIC
      #################################################


          - type: custom-api
            title: 🌍 Internet
            cache: 5m
            url: https://ipinfo.io/json
            template: |
              <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div style="font-size: 1.6rem; font-weight: bold; color: #3b82f6;">
                  {{ .JSON.String "ip" }}
                </div>
                <div style="font-size: 1.2rem; opacity: 0.8; font-weight: 500;">
                  📍 {{ .JSON.String "city" }}, {{ .JSON.String "country" }}
                </div>
                <div style="font-size: 1.1rem; opacity: 0.6; font-style: italic;">
                  🌐 {{ .JSON.String "org" }}
                </div>
              </div>

          #################################################
          # CUSTOM API - Internet Speed
          #################################################

          - type: custom-api
            title: Internet Speed
            title-url: http://${SERVER_IP}:${PORT}
            cache: 1h
            url: http://${SERVER_IP}:${PORT}/api/v1/results/latest
            headers:
              Authorization: Bearer ${SPEEDTEST_TOKEN}
            subrequests:
              stats:
                url: http://${SERVER_IP}:${PORT}/api/v1/stats
                headers:
                  Authorization: Bearer ${SPEEDTEST_TOKEN}
                  Accept: application/json
            options:
              showPercentageDiff: true
            template: |
              {{ $showPercentage := .Options.BoolOr "showPercentageDiff" true }}

              {{ $stats := .Subrequest "stats" }}
              <div class="flex justify-between text-center margin-block-3">
              <div>
                  {{ $downloadChange := percentChange ($stats.JSON.Float "data.download.avg_bits") (.JSON.Float "data.download_bits")
                  }}
                  {{ if $showPercentage }}
                  <div
                  class="size-small {{ if gt $downloadChange 0.0 }}color-positive{{ else if lt $downloadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
                  style="display: inline-flex; align-items: center;">
                  {{ $downloadChange | printf "%+.1f%%" }}
                  {{ if gt $downloadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ else if lt $downloadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.download_bits" | mul 0.000001 | printf "%.1f" }}</div>
                  <div class="size-h6">DOWNLOAD</div>
              </div>
              <div>
                  {{ $uploadChange := percentChange ($stats.JSON.Float "data.upload.avg_bits") (.JSON.Float "data.upload_bits") }}
                  {{ if $showPercentage }}
                  <div
                  class="size-small {{ if gt $uploadChange 0.0 }}color-positive{{ else if lt $uploadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
                  style="display: inline-flex; align-items: center;">
                  {{ $uploadChange | printf "%+.1f%%" }}
                  {{ if gt $uploadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ else if lt $uploadChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.upload_bits" | mul 0.000001 | printf "%.1f" }}</div>
                  <div class="size-h6">UPLOAD</div>
              </div>
              <div>
                  {{ $pingChange := percentChange ($stats.JSON.Float "data.ping.avg") (.JSON.Float "data.ping") }}
                  {{ if $showPercentage }}
                  <div
                  class="size-small {{ if gt $pingChange 0.0 }}color-negative{{ else if lt $pingChange 0.0 }}color-positive{{ else }}color-primary{{ end }}"
                  style="display: inline-flex; align-items: center;">
                  {{ $pingChange | printf "%+.1f%%" }}
                  {{ if lt $pingChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ else if gt $pingChange 0.0 }}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                      style="height: 1em; margin-left: 0.25em;" class="size-4">
                      <path fill-rule="evenodd"
                      d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ end }}
                  </div>
                  {{ end }}
                  <div class="color-highlight size-h3">{{ .JSON.Float "data.ping" | printf "%.0f ms" }}</div>
                  <div class="size-h6">PING</div>
              </div>
              </div>

          #################################################
          # CUSTOM API - wg-easy clients
          #################################################

          - type: custom-api
            title: WG-Easy Clients
            cache: 5m
            url: http://${SERVER_IP}:${PORT}/api/session
            method: POST
            body-type: json
            body:
              password: "${WGEASY_PASSWORD}"
            template: |
              {{ if eq .Response.StatusCode 200 }}
                {{ $cookie := .Response.Header.Get "Set-Cookie" }}
                {{ $sid := findMatch "connect\\.sid=([^;]+)" $cookie }}
                {{
                  $clients := newRequest "http://${SERVER_IP}:${PORT}/api/wireguard/client"
                    | withHeader "Cookie" $sid
                    | getResponse
                }}
                <div>
                  {{ range $client := $clients.JSON.Array "" }}
                  <div class="flex items-center gap-10 margin-bottom-5">
                    <span>{{ if $client.Bool "enabled" }}🟢{{ else }}🔴{{ end }}</span>
                    <span class="size-h4">{{ $client.String "name" }}</span>
                    <span class="color-subdue size-h5">{{ $client.String "address" }}</span>
                  </div>
                  {{ end }}
                </div>
              {{ else }}
                <p class="color-negative">Error: {{ .Response.Status }}</p>
              {{ end }}


          - type: dns-stats
            service: adguard
            url: http://${SERVER_IP}:${PORT}
            username: ${ADGUARD_USERNAME}
            password: ${ADGUARD_PASSWORD}

          #################################################
          # CUSTOM API - Tailscale Devices
          #################################################

          - type: custom-api
            title: Tailscale Devices
            title-url: https://login.tailscale.com/admin/machines
            url: https://api.tailscale.com/api/v2/tailnet/${TAILSCALE_TAILNET}/devices
            headers:
              Authorization: Bearer ${TAILSCALE_API_KEY}
            options:
              # collapseAfter: 4
              # disableOfflineIndicator: true
              # disableUpdateIndicator: true
              # prioritiseTags: true
            template: |
              <style>
                .device-info-container-tailscale {
                  position: relative;
                  overflow: hidden;
                  height: 1.5em;
                }

                .device-info-tailscale {
                  display: flex;
                  transition: transform 0.2s ease, opacity 0.2s ease;
                }

                .device-ip-tailscale {
                  position: absolute;
                  top: 0;
                  left: 0;
                  transform: translateY(-100%);
                  opacity: 0;
                  transition: transform 0.2s ease, opacity 0.2s ease;
                }

                .device-info-container-tailscale:hover .device-info-tailscale {
                  transform: translateY(100%);
                  opacity: 0;
                }

                .device-info-container-tailscale:hover .device-ip-tailscale {
                  transform: translateY(0);
                  opacity: 1;
                }

                .update-indicator-tailscale {
                  width: 8px;
                  height: 8px;
                  border-radius: 50%;
                  background-color: var(--color-primary);
                  display: inline-block;
                  margin-left: 4px;
                  vertical-align: middle;
                }

                .offline-indicator-tailscale {
                  width: 8px;
                  height: 8px;
                  border-radius: 50%;
                  background-color: var(--color-negative);
                  display: inline-block;
                  margin-left: 4px;
                  vertical-align: middle;
                }

                .device-name-container-tailscale {
                  display: flex;
                  align-items: center;
                  gap: 8px;
                }

                .indicators-container-tailscale {
                  display: flex;
                  align-items: center;
                  gap: 4px;
                }
              </style>
              <ul class="list list-gap-10 collapsible-container" data-collapse-after="{{ .Options.IntOr "collapseAfter" 3 }}">
                {{ range .JSON.Array "devices" }}
                <li>
                  <div class="flex items-center gap-10">
                    <div class="device-name-container-tailscale grow">
                      <span class="size-h4 block text-truncate color-primary">
                        {{ findMatch "^([^.]+)" (.String "name") }}
                      </span>
                      <div class="indicators-container-tailscale">
                        {{ if and (not ($.Options.BoolOr "disableUpdateIndicator" false)) (.Bool "updateAvailable") }}
                        <span class="update-indicator-tailscale" data-popover-type="text" data-popover-text="Update Available"></span>
                        {{ end }}

                        {{ if not ($.Options.BoolOr "disableOfflineIndicator" false) }}
                        {{ $lastSeen := .String "lastSeen" | parseTime "rfc3339" }}
                        {{ if not ($lastSeen.After (offsetNow "-10s")) }}
                        {{ $lastSeenTimezoned := $lastSeen.In now.Location }}
                        <span class="offline-indicator-tailscale" data-popover-type="text"
                          data-popover-text="Offline - Last seen {{ $lastSeenTimezoned.Format " Jan 2 3:04pm" }}"></span>
                        {{ end }}
                        {{ end }}

                      </div>
                    </div>
                  </div>
                  <div class="device-info-container-tailscale">
                    <ul class="list-horizontal-text device-info-tailscale">
                      <li>{{ .String "os" }}</li>
                      <li>
                        {{ if and ($.Options.BoolOr "prioritiseTags" false) (.Exists "tags.0") }}
                          {{ trimPrefix "tag:" (.String "tags.0") }}
                        {{ else }}
                          {{ .String "user" }}
                        {{ end }}
                      </li>
                    </ul>
                    <div class="device-ip-tailscale">
                      {{ .String "addresses.0"}}
                    </div>
                  </div>
                </li>
                {{ end }}
              </ul>



          #################################################
          # CUSTOM API - NetAlertX
          #################################################

          - type: custom-api
            title: NetAlertX Device Status
            method: GET
            cache: 5m
            url: http://${SERVER_IP}:${PORT}/php/server/query_json.php?file=table_devices.json
            template: |
              {{ $data := .JSON.Array "data" }}
              {{ $connectedDevicesCount := 0 }}

              {{ range $dev := $data }}
                {{ if eq ($dev.Int "devPresentLastScan") 1 }}
                  {{ $connectedDevicesCount = add $connectedDevicesCount 1 }}
                {{ end }}
              {{ end }}

              <div style="font-weight:bold;font-size:1.2em;margin-bottom:0.5em;">
                <details open>
                  <summary class="color-highlight size-h3"
                           style="cursor:pointer;font-weight:600;">
                    Connected ({{ $connectedDevicesCount }})
                  </summary>

                  <div style="max-height:300px;overflow-y:auto;padding-right:6px;">
                    <ul style="padding-left:0;margin:0;list-style:none;">

                      {{ range $dev := $data }}
                        {{ if eq ($dev.Int "devPresentLastScan") 1 }}

                          {{ $name := $dev.String "devName" }}
                          {{ $ip := $dev.String "devLastIP" }}
                          {{ $displayName := $name }}

                          {{ if gt (len $name) 26 }}
                            {{ $displayName = printf "%s…" (slice $name 0 26) }}
                          {{ end }}

                          <li style="margin-bottom:1em;">
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

                              <!-- Icono fijo universal -->
                              <span style="font-size:18px;">🖥️</span>

                              <span title="{{ $name }}"
                                    style="font-weight:600;font-size:0.9em;
                                           white-space:nowrap;overflow:hidden;
                                           text-overflow:ellipsis;max-width:200px;">
                                {{ $displayName }}
                              </span>

                              <span style="padding:2px 6px;
                                           font-size:0.75em;
                                           color:var(--color-positive);
                                           border:1px solid var(--color-positive);
                                           border-radius:4px;">
                                On-Line
                              </span>

                            </div>

                            <div title="{{ $ip }}"
                                 style="font-size:0.75em;
                                        color:var(--color-subtle);
                                        margin-top:2px;">
                              {{ $ip }}
                            </div>
                          </li>

                        {{ end }}
                      {{ end }}

                    </ul>
                  </div>
                </details>
              </div>


#################################################
#              PAGE: INFRASTRUCTURE
#################################################

  - name: Infrastructure and Media
    columns:

      - size: small
        widgets:

      #################################################
      # COLUMN 1 - SMALL LAST COMMUNITY WIDGETS
      #################################################

          - type: custom-api
            title: Latest Community Widgets
            cache: 1d
            url: https://raw.githubusercontent.com/glanceapp/community-widgets/refs/heads/main/registry/widgets.json
            template: |
              <ul class="list list-gap-14 collapsible-container" data-collapse-after="3">
                {{ $widgets := .JSON.Array "" | sortByTime "time_added" "rfc3339" "desc" }}
                {{ if gt (len $widgets) 10 }}
                  {{ $widgets = slice $widgets 0 10 }}
                {{ end }}
                {{ range $widgets }}
                <li>
                  <a class="size-h4 block text-truncate color-primary-if-not-visited" href="https://github.com/glanceapp/community-widgets/blob/main/widgets/{{ .String "directory" }}/README.md" target="_blank" rel="noreferrer">{{ .String "title" }}</a>
                  <p class="text-truncate-2-lines margin-top-3">{{ .String "description" }}</p>
                  <ul class="list-horizontal-text margin-top-3">
                    <li {{ .String "time_added" | parseRelativeTime "rfc3339" }}></li>
                    <li>{{ .String "author" }}</li>
                  </ul>
                </li>
                {{ end }}
              </ul>


      #################################################
      # COLUMN 1 - SMALL SONARR WIDGET
      #################################################

          - type: custom-api
            title: Sonarr
            title-url: http://${SERVER_IP}:${PORT}
            cache: 30m
            options:
              service: sonarr          # sonarr, radarr, or lidarr
              type: recent           # upcoming, recent, or missing
              size: small             # small, medium, large, or huge
              collapse-after: 3
              show-grabbed: false
              interval: 30             # optional, days
              #sort-time: asc          # optional, asc or desc (default)
              #cover-proxy: "https://proxy.example.com/radarrcover" # optional
              api-base-url: http://${SERVER_IP}:${PORT}
              key: ${SONARR_API_KEY}
              url: http://${SERVER_IP}:${PORT}/      # optional
            template: |
              {{ $collapseAfter := .Options.IntOr "collapse-after" 5 }}
              {{ $showGrabbed := .Options.BoolOr "show-grabbed" false }}
              {{ $sortTime := .Options.StringOr "sort-time" "desc" }}
              {{ $coverProxy := .Options.StringOr "cover-proxy" "" }}
              {{ $size := .Options.StringOr "size" "medium" }}
              {{ $service := .Options.StringOr "service" "" }}
              {{ $type := .Options.StringOr "type" "" }}
              {{ $intervalH := .Options.IntOr "interval" 0 | mul 24 }}

              {{ $now := now | formatTime "2006-01-02T15:04:05" }}
              {{ $posInterval := (offsetNow (printf "+%dh" $intervalH)) | formatTime "2006-01-02T15:04:05" }}
              {{ $negInterval := (offsetNow (printf "-%dh" $intervalH)) | formatTime "2006-01-02T15:04:05" }}

              {{ $apiBaseUrl := .Options.StringOr "api-base-url" "" }}
              {{ $key := .Options.StringOr "key" "" }}
              {{ $url := .Options.StringOr "url" $apiBaseUrl }}

              {{ if or (and (ne $service "sonarr") (ne $service "radarr") (ne $service "lidarr"))
                      (and (ne $type "upcoming") (ne $type "recent") (ne $type "missing")) 
                      (eq $apiBaseUrl "") (eq $key "") (eq $url "") }}
                <div class="widget-error-header">
                    <div class="color-negative size-h3">ERROR</div>
                    <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
                    </svg>
                  </div>
                  <p class="break-all">
                    Some options are not set or malformed
                      <table style="border-spacing: 1rem;">
                        <tr><td>service</td><td>{{ $service }}</td><td>must be sonarr, radarr, or lidarr</td></tr>
                        <tr><td>type</td><td>{{ $type }}</td><td>must be upcoming, recent, or missing</td></tr>
                        <tr><td>api-base-url</td><td>{{ $apiBaseUrl }}</td><td>should include http(s):// and port if needed</td></tr>
                        <tr><td>key</td><td>{{ $key }}</td><td></td></tr>
                      </table> 
                  </p>
              {{ else }}
                {{ $requestUrl := "" }}
            
                {{ if eq $service "sonarr" }}
                  {{ if eq $type "recent" }}
                    {{ $requestUrl = printf "%s/api/v3/history/since?includeSeries=true&includeEpisode=true&eventType=grabbed&date=%s" $apiBaseUrl $negInterval }}
                  {{ else if eq $type "missing" }}
                    {{ $requestUrl = printf "%s/api/v3/wanted/missing?page=1&pageSize=50&includeSeries=true" $apiBaseUrl }}
                  {{ else if eq $type "upcoming" }}
                    {{ $requestUrl = printf "%s/api/v3/calendar?includeSeries=true&start=%s&end=%s" $apiBaseUrl $now $posInterval }}
                  {{ end }}
                  
                {{ else if eq $service "radarr" }}
                  {{ if eq $type "recent" }}
                    {{ $requestUrl = printf "%s/api/v3/history/since?includeMovie=true&eventType=grabbed&date=%s" $apiBaseUrl $negInterval }}
                  {{ else if eq $type "missing" }}
                    {{ $requestUrl = printf "%s/api/v3/wanted/missing?page=1&pageSize=50" $apiBaseUrl }}
                  {{ else if eq $type "upcoming" }}
                    {{ $requestUrl = printf "%s/api/v3/calendar?start=%s&end=%s" $apiBaseUrl $now $posInterval }}
                  {{ end }}
                  
                {{ else if eq $service "lidarr" }}
                  {{ if eq $type "recent" }}
                    {{ $requestUrl = printf "%s/api/v1/history/since?includeArtist=true&includeAlbum=true&eventType=grabbed&date=%s" $apiBaseUrl $negInterval }}
                  {{ else if eq $type "missing" }}
                    {{ $requestUrl = printf "%s/api/v1/wanted/missing?page=1&pageSize=50&includeArtist=true" $apiBaseUrl }}
                  {{ else if eq $type "upcoming" }}
                    {{ $requestUrl = printf "%s/api/v1/calendar?includeArtist=true&start=%s&end=%s" $apiBaseUrl $now $posInterval }}
                  {{ end }}
                {{ end }}
            
                {{ $data := newRequest $requestUrl
                  | withHeader "Accept" "application/json"
                  | withHeader "X-Api-Key" $key
                  | getResponse }}
            
                <ul class="list list-gap-14 collapsible-container single-line-titles" data-collapse-after="{{ $collapseAfter }}">
                  {{ $array := "" }}
                  {{ $sortByField := "" }}
                  {{ $itemDisplayed := false }}
                  {{ $itemDate := "" }}
                  {{ $isAvailable := false }}
            
                  {{ if eq $type "missing" }}
                    {{ $array = "records" }}
                    {{ if eq $service "sonarr" }}
                      {{ $sortByField = "airDateUtc" }}
                    {{ else }}
                      {{ $sortByField = "releaseDate" }}
                    {{ end }}
                  {{ else if eq $type "recent" }}
                    {{ $sortByField = "date" }}
                  {{ else }}
                    {{ if eq $service "sonarr" }}
                      {{ $sortByField = "airDateUtc" }}
                    {{ else }}
                      {{ $sortByField = "releaseDate" }}
                    {{ end }}
                  {{ end }}
            
                  {{ range $data.JSON.Array $array | sortByTime $sortByField "rfc3339" $sortTime }}
                    
                    {{ if eq $service "sonarr" }}
                      {{ $itemDate = .String "airDateUtc" | parseTime "RFC3339" }}
                      {{ $itemDate = $itemDate.In now.Location | formatTime "2006-01-02T15:04:05" }}
                      {{ $isAvailable = true }}
                    {{ else if eq $service "radarr"}}
                      {{ $isAvailable = .Bool "isAvailable" }}
                      {{ $itemDate = .String "releaseDate" }}
                    {{ else if eq $service "lidarr"}}
                      {{ $itemDate = .String "releaseDate" }}
                      {{ $isAvailable = true }}
                    {{ end }}
            
                    {{ if or (eq $type "upcoming") (eq $type "recent") (and (or (and (gt $itemDate $negInterval) ((lt $itemDate $now ))) (eq $intervalH 0))  $isAvailable) }}
                      {{ $itemDisplayed = true }}
                      {{ $title := "" }}
                      {{ $subtitle := "" }}
                      {{ $coverUrl := "" }}
                      {{ $status := "" }}
                      {{ $coverBase := "" }}
                      {{ $height := "" }}
                      {{ $width := "" }}
                      {{ $popoverTitle := "" }}
                      {{ $popoverSubtitle := "" }}
                      {{ $popoverSummary := "" }}
                      {{ $summary := "" }}
                      {{ $link := "" }}
                      {{ $grabbed := false }}
                      {{ $date := now }}
                      {{ $datetype := "" }}
                      {{ $seString := "" }}
                      {{ $genres := "" }}
                      {{ $buttonJustify := "left" }}
            
              
                      {{ if eq $service "sonarr" }}
                        {{ $series := "" }}
                        {{ if eq $coverProxy "" }}
                          {{ $coverBase = printf "%s/api/v3/mediacover" $apiBaseUrl }}
                          {{ $coverUrl = printf "%s/%s/poster-500.jpg?apikey=%s" $coverBase (.String "seriesId") $key }}
                        {{ else }}
                          {{ $coverBase = $coverProxy }}
                          {{ $coverUrl = printf "%s/%s/poster-500.jpg" $coverBase (.String "seriesId") }}
                        {{ end }}
                        {{ $title = .String "series.title" }}
                        {{ $link = printf "%s/series/%s#" $url (.String "series.titleSlug") }}
                        {{ $series = .Get "series" }}
                        {{ $genres = $series.Get "genres" }}
                      
                        {{ if eq $type "recent" }}
                          {{ $date = .String "date" | parseLocalTime "RFC3339" }}
                          {{ $date = $date.In now.Location }}
                          {{ $subtitle = .String "episode.title" }}
                          {{ $summary = .String "episode.overview" }}
                          {{ $seString = printf "S%02dE%02d" (.Int "episode.seasonNumber") (.Int "episode.episodeNumber") }}
                          {{ $datetype = "Downloaded" }}
                  
                          {{ if $showGrabbed }}
                            {{ $popoverTitle = .String "episode.title" }}
                            {{ $popoverSubtitle = $seString }}
                            {{ $popoverSummary = .String "episode.overview" }}
                            {{ if .Bool "episode.hasFile" }}
                              {{ $grabbed = true }}
                            {{ end }}
                          {{ else }}
                            {{ $popoverTitle = .String "series.title" }}
                            {{ $popoverSummary = .String "series.overview" }}
                          {{ end }}
              
                        {{ else if eq $type "missing" }}
                          {{ $date = .String "airDateUtc" | parseLocalTime "RFC3339" }}
                          {{ $date = $date.In now.Location }}
                          {{ $subtitle = .String "title" }}
                          {{ $summary = .String "overview" }}
                          {{ $seString = printf "S%02dE%02d" (.Int "seasonNumber") (.Int "episodeNumber") }}
                          {{ $datetype = "Aired" }}
                          {{ if $showGrabbed }}
                            {{ $popoverTitle = .String "title" }}
                            {{ $popoverSubtitle = $seString }}
                            {{ $popoverSummary = .String "overview" }}
                            {{ if .Bool "episode.hasFile" }}
                              {{ $grabbed = true }}
                            {{ end }}
                          {{ else }}
                            {{ $popoverTitle = .String "series.title" }}
                            {{ $popoverSummary = .String "series.overview" }}
                          {{ end }}
                        {{ else if eq $type "upcoming" }}
                          {{ $date = .String "airDateUtc" | parseLocalTime "RFC3339" }}
                          {{ $date = $date.In now.Location }}
                          {{ $subtitle = .String "title" }}
                          {{ $summary = .String "overview" }}
                          {{ $seString = printf "S%02dE%02d" (.Int "seasonNumber") (.Int "episodeNumber") }}
                          {{ $datetype = "Airs" }}
                          {{ if $showGrabbed }}
                            {{ $popoverTitle = .String "title" }}
                            {{ $popoverSubtitle = $seString }}
                            {{ $popoverSummary = .String "overview" }}
                            {{ if .Bool "hasFile" }}
                              {{ $grabbed = true }}
                            {{ end }}
                          {{ else }}
                            {{ $popoverTitle = .String "series.title" }}
                            {{ $popoverSummary = .String "series.overview" }}
                          {{ end }}
                        {{ end }}
                  
                  
                      {{ else if eq $service "radarr" }}
                        {{ $movie := "" }}
                        {{ $status = .String "status" }}
                        {{ if eq $coverProxy "" }}
                          {{ $coverBase = printf "%s/api/v3/mediacover" $apiBaseUrl }}
                        {{ else }}
                          {{ $coverBase = $coverProxy }}
                        {{ end }}
                        {{ if eq $status "announced"}}
                          {{ if ne (.String "inCinemas") "" }}
                            {{ $date = (.String "inCinemas" | parseTime "RFC3339") }}
                            {{ $datetype = "In Cinemas" }}
                          {{ else }}
                            {{ $date = (.String "releaseDate" | parseTime "RFC3339") }}
                            {{ $datetype = "Releases" }}
                          {{ end }}
                        {{ else if eq $status "inCinemas"}}
                          {{ $date = (.String "releaseDate" | parseTime "RFC3339") }}
                          {{ $datetype = "Releases" }}
                        {{ else if eq $status "released"}}
                          {{ $date = (.String "releaseDate" | parseTime "RFC3339") }}
                          {{ $datetype = "Released" }}
                        {{ end }}
            
                        {{ if eq $type "recent" }}
                          {{ if eq $coverProxy "" }}
                            {{ $coverUrl = printf "%s/%s/poster-500.jpg?apikey=%s" $coverBase (.String "movie.id") $key }}
                          {{ else }}
                            {{ $coverUrl = printf "%s/%s/poster-500.jpg" $coverBase (.String "movie.id") }}
                          {{ end }}
                          {{ $datetype = "Downloaded" }}
                          {{ $date = (.String "date" | parseTime "RFC3339") }}
                          {{ $title = .String "movie.title" }}
                          {{ $subtitle = "" }}
                          {{ $summary = .String "movie.overview" }}
                          {{ $popoverTitle = .String "movie.title" }}
                          {{ $popoverSubtitle = printf "%s %s" $datetype ($date | formatTime "1/2/2006") }}
                          {{ $popoverSummary = .String "movie.overview" }}
                          {{ $link = printf "%s/movie/%s#" $url (.String "movie.titleSlug") }}
                          {{ $movie = .Get "movie" }}
                          {{ $genres = $movie.Get "genres" }}
                          {{ if and $showGrabbed (gt (.Int "movie.movieFileId") 0) }}
                            {{ $grabbed = true }}
                          {{ end }}
                        {{ else }}
                          {{ if eq $coverProxy "" }}
                            {{ $coverUrl = printf "%s/%s/poster-500.jpg?apikey=%s" $coverBase (.String "id") $key }}
                          {{ else }}
                            {{ $coverUrl = printf "%s/%s/poster-500.jpg" $coverBase (.String "id") }}
                          {{ end }}
                          {{ $title = .String "title" }}
                          {{ $subtitle = "" }}
                          {{ $summary = .String "overview" }}
                          {{ $link = printf "%s/movie/%s#" $url (.String "titleSlug") }}
                          {{ $popoverTitle = .String "title" }}
                          {{ $popoverSubtitle = printf "%s %s" $datetype ($date | formatTime "1/2/2006") }}
                          {{ $popoverSummary = .String "overview" }}
                          {{ $genres = .Get "genres" }}
                          {{ if eq $type "missing" }}
                            {{ if and $showGrabbed (.Bool "movie.hasFile") }}
                              {{ $grabbed = true }}
                            {{ end }}
                          {{ else }}
                            {{ if and $showGrabbed (.Bool "hasFile") }}
                              {{ $grabbed = true }}
                            {{ end }}
                          {{ end }}
                        {{ end }}
            
                  
                      {{ else if eq $service "lidarr" }}
                        {{ $artist := "" }}
                        {{ $album := "" }}
                        {{ $albumId := "" }}
                        {{ if eq $coverProxy "" }}
                          {{ $coverBase = printf "%s/api/v1/mediacover" $apiBaseUrl }}
                        {{ else }}
                          {{ $coverBase = $coverProxy }}
                        {{ end }}
            
                        {{ if eq $type "recent" }}
                          {{ $album = .Get "album" }}
                          {{ $artist = $album.Get "artist" }}
                          {{ if eq $coverProxy "" }}
                            {{ $coverUrl = printf "%s/album/%s/cover-500.jpg?apikey=%s" $coverBase (.String "albumId") $key }}
                          {{ else }}
                            {{ $coverUrl = printf "%s/album/%s/cover-500.jpg" $coverBase (.String "albumId") }}
                          {{ end }}
                          {{ $grabbed = true }}
                          {{ $title = $album.String "title" }}
                          {{ $date = (.String "date" | parseTime "RFC3339") }}
                          {{ $datetype = "Downloaded" }}
                          {{ $subtitle = $artist.String "artistName" }}
